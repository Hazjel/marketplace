$kind: http-request
url: http://127.0.0.1:8000/api/register
method: POST
headers:
  Accept: application/json
body:
  type: formdata
  content:
    - type: text
      key: name
      value: bilek
    - type: text
      key: email
      value: bilek@gmail.com
    - type: text
      key: password
      value: "12345678"
    - type: text
      key: role
      value: buyer
order: 1000

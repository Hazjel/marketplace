$kind: http-request
name: Add to Cart
url: "{{base_url}}/cart"
method: POST
headers:
  Accept: application/json
body:
  type: formdata
  content:
    - type: text
      key: product_id
      value: "1"
    - type: text
      key: variant_id
      value: ""
    - type: text
      key: quantity
      value: "1"
    - type: text
      key: note
      value: ""
auth:
  type: bearer
  credentials:
    token: "{{token}}"
order: 2000

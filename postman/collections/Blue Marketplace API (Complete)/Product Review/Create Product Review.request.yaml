$kind: http-request
url: "{{base_url}}/product-review"
method: POST
headers:
  Accept: application/json
body:
  type: formdata
  content:
    - type: text
      key: product_id
      value: "1"
    - type: text
      key: rating
      value: "5"
    - type: text
      key: comment
      value: Produk sangat bagus!
auth:
  type: bearer
  credentials:
    token: "{{token}}"
order: 2000

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "chat-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["chat-service:8001"]

  - job_name: "laravel-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["nginx:80"]

  - job_name: "recommendation-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["recommendation-service:8002"]

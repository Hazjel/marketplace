apiVersion: 1

providers:
  - name: "chat-service"
    orgId: 1
    folder: "Chat Service"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards/chat-service

  - name: "laravel-api"
    orgId: 1
    folder: "Laravel API"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards/laravel-api

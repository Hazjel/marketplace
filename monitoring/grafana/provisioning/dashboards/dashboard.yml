apiVersion: 1

providers:
  - name: "ai-service"
    orgId: 1
    folder: "AI Service"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards/ai-service

  - name: "laravel-api"
    orgId: 1
    folder: "Laravel API"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards/laravel-api

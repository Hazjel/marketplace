server {
    listen 80;
    server_name localhost;

    client_max_body_size 20M;

    # ---------------------------------------------------------------------------
    # Proxy ke Laravel artisan serve (php artisan serve --host=0.0.0.0 --port=8000)
    # Nginx berfungsi sebagai reverse proxy: handle static files + single entry point
    # ---------------------------------------------------------------------------

    # File storage Laravel (public disk) — serve langsung dari disk container
    location /storage {
        alias /var/www/storage/app/public;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Semua request lain → forward ke artisan serve
    location / {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;

        # Header wajib untuk Laravel agar tahu request asli
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout yang cukup untuk proses DB-heavy
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;

        # Matikan buffering untuk SSE / streaming response (future-proof)
        proxy_buffering    off;
    }

    location ~ /\.ht {
        deny all;
    }
}

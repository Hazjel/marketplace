server {
    listen 80;
    server_name localhost 192.168.1.29;

    client_max_body_size 20M;

    # Laravel storage files (public disk)
    location /storage {
        alias /var/www/storage/app/public;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Laravel API — PHP-FPM via FastCGI (semua request lewat public/index.php)
    location ~ ^/(api|sanctum)(/.*)?$ {
        root                    /var/www/public;
        fastcgi_pass            api:9000;
        fastcgi_index           index.php;
        include                 fastcgi_params;
        fastcgi_param           SCRIPT_FILENAME  $document_root/index.php;
        fastcgi_param           PATH_INFO        $fastcgi_path_info;
        fastcgi_read_timeout    300s;
        fastcgi_send_timeout    300s;
        fastcgi_buffering       off;
    }

    # Reverb WebSocket (pusher protocol path: /app/{key})
    location /app {
        proxy_pass         http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # AI Service (FastAPI) — strips /ai prefix before forwarding
    location /ai {
        rewrite ^/ai(/.*)$ $1 break;
        proxy_pass         http://ai-service:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    # Komerce shipping API proxy (replaces Vite dev server proxy)
    location /tariff/api {
        proxy_pass         https://api-sandbox.collaborator.komerce.id/tariff/api;
        proxy_http_version 1.1;
        proxy_set_header   Host              api-sandbox.collaborator.komerce.id;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_ssl_server_name on;
    }

    # Vue SPA — serve static files with HTML5 history fallback
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.ht {
        deny all;
    }
}

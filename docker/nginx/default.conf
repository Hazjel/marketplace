server {
    listen 80;
    server_name localhost 192.168.1.29;

    client_max_body_size 20M;

    # Laravel storage files (public disk)
    location /storage {
        alias /var/www/storage/app/public;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Laravel API
    location /api {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_buffering    off;
    }

    # Laravel Sanctum (CSRF cookie & auth)
    location /sanctum {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # AI Service (FastAPI) — strips /ai prefix before forwarding
    location /ai {
        rewrite ^/ai(/.*)$ $1 break;
        proxy_pass         http://ai-service:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    # Komerce shipping API proxy (replaces Vite dev server proxy)
    location /tariff/api {
        proxy_pass         https://api-sandbox.collaborator.komerce.id/tariff/api;
        proxy_http_version 1.1;
        proxy_set_header   Host              api-sandbox.collaborator.komerce.id;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_ssl_server_name on;
    }

    # Vue SPA — serve static files with HTML5 history fallback
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.ht {
        deny all;
    }
}

services:
  # ─────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: blue-mysql
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: api_blue
    ports:
      - "${DB_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: blue-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: blue-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo-express:
    image: mongo-express:latest
    container_name: blue-mongo-express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH: "false"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: blue-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ""

  # ─────────────────────────────────────────
  # Backend API (Laravel + Nginx)
  # ─────────────────────────────────────────
  api:
    build:
      context: ./api-blue
    container_name: blue-api
    restart: unless-stopped
    entrypoint: ["bash", "/var/www/docker-entrypoint.sh"]
    expose:
      - "9000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./api-blue:/var/www
      - api_vendor:/var/www/vendor
    environment:
      APP_NAME: Blukios
      APP_ENV: local
      # Cache config/route container ke luar bind mount — kalau tidak, cache
      # berisi DB_HOST=mysql bocor ke host dan merusak `php artisan test` lokal
      APP_CONFIG_CACHE: /tmp/laravel-config.php
      APP_ROUTES_CACHE: /tmp/laravel-routes.php
      APP_DEBUG: "true"
      APP_URL: ${APP_URL:-http://localhost}
      APP_KEY: ${APP_KEY:-base64:CHANGE_ME_GENERATE_WITH_ARTISAN}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: api_blue
      DB_USERNAME: root
      DB_PASSWORD: ""
      DB_MONGO_CONNECTION: mongodb
      DB_MONGO_HOST: mongodb
      DB_MONGO_PORT: 27017
      DB_MONGO_DATABASE: blukios_mongo
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "null"
      REDIS_CLIENT: predis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: database
      MAIL_MAILER: smtp
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@blukios.com}
      MAIL_FROM_NAME: Blukios
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY:-}
      MIDTRANS_IS_PRODUCTION: "false"
      KEY_RAJA_ONGKIR: ${KEY_RAJA_ONGKIR:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: "543210123"
      REVERB_APP_KEY: ${REVERB_APP_KEY:-reverbkey}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-reverbsecret}
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-}
      # Fallback ke KEY_RAJA_ONGKIR — string kosong akan menimpa fallback di config
      KOMERCE_API_KEY: ${KOMERCE_API_KEY:-${KEY_RAJA_ONGKIR:-}}

  nginx:
    image: nginx:alpine
    container_name: blue-nginx
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "${NGINX_HOST_PORT:-80}:80"
    volumes:
      - ./api-blue:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - fe_dist:/usr/share/nginx/html:ro

  # ─────────────────────────────────────────
  # Queue Worker
  # ─────────────────────────────────────────
  queue:
    build:
      context: ./api-blue
    container_name: blue-queue
    restart: unless-stopped
    entrypoint: []
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=90"]
    depends_on:
      - api
    volumes:
      - ./api-blue:/var/www
      - api_vendor:/var/www/vendor
    environment:
      APP_NAME: Blukios
      APP_ENV: local
      # Cache config/route container ke luar bind mount — kalau tidak, cache
      # berisi DB_HOST=mysql bocor ke host dan merusak `php artisan test` lokal
      APP_CONFIG_CACHE: /tmp/laravel-config.php
      APP_ROUTES_CACHE: /tmp/laravel-routes.php
      APP_KEY: base64:mzp8+4+f+GYdZuiqdL528buQXoyjZDXKMHrgk4+Q85o=
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: api_blue
      DB_USERNAME: root
      DB_PASSWORD: ""
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "null"
      REDIS_CLIENT: predis
      QUEUE_CONNECTION: redis
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: "543210123"
      REVERB_APP_KEY: ${REVERB_APP_KEY:-reverbkey}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-reverbsecret}
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http

  # ─────────────────────────────────────────
  # Reverb WebSocket Server
  # ─────────────────────────────────────────
  reverb:
    build:
      context: ./api-blue
    container_name: blue-reverb
    restart: unless-stopped
    entrypoint: []
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    depends_on:
      - api
    volumes:
      - ./api-blue:/var/www
      - api_vendor:/var/www/vendor
    environment:
      APP_NAME: Blukios
      APP_ENV: local
      # Cache config/route container ke luar bind mount — kalau tidak, cache
      # berisi DB_HOST=mysql bocor ke host dan merusak `php artisan test` lokal
      APP_CONFIG_CACHE: /tmp/laravel-config.php
      APP_ROUTES_CACHE: /tmp/laravel-routes.php
      APP_KEY: base64:mzp8+4+f+GYdZuiqdL528buQXoyjZDXKMHrgk4+Q85o=
      REVERB_APP_ID: "543210123"
      REVERB_APP_KEY: ${REVERB_APP_KEY:-reverbkey}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-reverbsecret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "null"
      REDIS_CLIENT: predis
      CACHE_STORE: redis

  # ─────────────────────────────────────────
  # Frontend (Vue.js)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./fe-blue
      args:
        VITE_APP_NAME: Blue
        # Relative — nginx proxy /api & /ai, jalan di localhost/LAN/Tailscale sekaligus
        VITE_API_BASE_URL: /api
        VITE_AI_SERVICE_URL: /ai
        VITE_MIDTRANS_CLIENT_KEY: Mid-client-xjQUjCcbhOHl68O3
        VITE_MIDTRANS_IS_PRODUCTION: "false"
        # Host/port websocket dinamis mengikuti halaman (lihat echo.js)
        VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-reverbkey}
    container_name: blue-frontend
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - fe_dist:/app/dist

  # ─────────────────────────────────────────
  # AI Service (FastAPI + Ollama)
  # ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: blue-ollama
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama:/root/.ollama

  chat-service:
    build:
      context: ./chat-service
    container_name: blue-ai
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_started
      redis:
        condition: service_healthy
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8001 --reload --reload-delay 1 --proxy-headers --forwarded-allow-ips='*'
    ports:
      - "8001:8001"
    volumes:
      - ./chat-service:/app
      - chroma_data:/app/chroma_db        # RAG vector index
      - chroma_cache:/root/.cache/chroma  # ONNX model cache — hindari re-download 79MB
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen3:1.7b
      OLLAMA_TIMEOUT_S: 180
      OLLAMA_MAX_RETRIES: 1
      LARAVEL_API_URL: http://nginx:80
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://lab-hajel.tail03faae.ts.net,http://192.168.1.29,http://localhost:5173,http://localhost:3000}
      RATE_LIMIT_PER_MINUTE: 20
      SESSION_TTL_MINUTES: 60
      # Tier 3 — Redis persistent session
      REDIS_URL: redis://redis:6379/0

  # ─────────────────────────────────────────
  # Monitoring (optional profile)
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: blue-prometheus
    profiles: ["monitoring"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"   # simpan 15 hari histori
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus               # persist data antar restart
    depends_on:
      - chat-service
      - nginx

  grafana:
    image: grafana/grafana:latest
    container_name: blue-grafana
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: smtp.gmail.com:587
      GF_SMTP_USER: ${MAIL_USERNAME:-}
      GF_SMTP_PASSWORD: ${MAIL_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@blukios.com}
      GF_SMTP_FROM_NAME: "Blukios Alerting"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - grafana:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  k6:
    image: grafana/k6:latest
    container_name: blue-k6
    profiles: ["loadtest"]
    volumes:
      - ./monitoring/k6:/scripts:ro
    entrypoint: ["k6", "run", "/scripts/loadtest.js"]
    depends_on:
      - chat-service

  # ─────────────────────────────────────────
  # CD — Jenkins (opsional, profile "cd")
  # ─────────────────────────────────────────
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: blue-jenkins
    profiles: ["cd"]
    restart: unless-stopped
    user: root  # perlu akses /var/run/docker.sock milik root di host
    ports:
      - "8082:8080"   # web UI — beda dari phpmyadmin (8080)
      - "50000:50000" # agent port (tidak dipakai untuk built-in node, aman dibiarkan)
    environment:
      JAVA_OPTS: "-Xmx512m"
      # dipakai Jenkinsfile buat cd — HARUS sama persis dgn source volume di bawah,
      # soalnya docker compose yg dijalankan di dalam container ini ngomong ke docker
      # daemon HOST (lewat docker.sock), bukan daemon di dalam container. Kalau target
      # mount beda dari path host asli (misal /host-project), relative path (./docker/nginx/...)
      # di-resolve jadi absolute path yg cuma valid di namespace container Jenkins, lalu
      # dikirim ke daemon host yang gak punya path itu -> "bind source path does not exist"
      HOST_PROJECT_DIR: ${PWD}
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker/cli-plugins/docker-compose:/usr/libexec/docker/cli-plugins/docker-compose:ro
      # mount direktori project host PERSIS di path yang sama (bukan /host-project) —
      # biar relative path di docker-compose.yml (./docker/nginx/default.conf dkk) di-resolve
      # jadi absolute path yang juga valid di docker daemon host. Efek sampingnya: nama folder
      # otomatis "marketplace" jadi -p marketplace di Jenkinsfile tetap dipertahankan untuk jaga-jaga.
      - ${PWD}:${PWD}

volumes:
  mysql_data:
  mongo_data:
  ollama:
  grafana:
  prometheus_data:   # Prometheus histori metrics
  chroma_data:       # ChromaDB RAG vector index
  jenkins_home:      # Jenkins config, job history, plugin
  chroma_cache:      # ONNX model all-MiniLM-L6-v2 cache (79MB)
  api_vendor:
  fe_node_modules:
  fe_dist:
